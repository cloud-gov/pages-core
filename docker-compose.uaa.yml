services:
  app:
    depends_on:
      - uaa
  bull-board:
    depends_on:
      - uaa
  uaa:
    build:
      dockerfile: ./Dockerfile-uaa
      context: .
      args:
        BUILD_ENV: $(BUILD_ENV)
    ports:
      - 9001:8080
    environment:
      BUILD_ENV: $(BUILD_ENV)
      POSTGRES_DB: federalist
      POSTGRES_PORT: 5432
      POSTGRES_HOST: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    depends_on:
      - db
    command: ["/tomcat/bin/catalina.sh", "run"]
